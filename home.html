<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitStreak Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <h2>
      <i class="fa-solid fa-person-running"></i>
      <span class="fit">Fit</span><span class="streak">Streak</span>
    </h2>
  </div>

  <!-- WELCOME -->
  <div class="welcome">
    <h3>Hi, Autominds 👋</h3>
    <p>Welcome back to FitStreak</p>
  </div>

  <!-- GOALS -->
  <h3 class="section">Today's Goals</h3>

  <div class="goals-container" id="goalsContainer"></div>

  <!-- EMPTY IMAGE -->
  <div class="empty" id="emptyState">
    <img src="https://parade.com/.image/w_3840,q_auto:good,c_limit/MTkwNTc2MDAyNDQyNjY3MTMz/goals-quotes-bo-jackson.jpg?arena_f_auto">
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <h3 id="percent">0%</h3>
      <p>Weekly</p>
    </div>
    <div class="stat">
      <h3 id="done">0</h3>
      <p>Done</p>
    </div>
    <div class="stat">
      <h3 id="total">0</h3>
      <p>Total</p>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <span class="active">🏠<br>Home</span>
    <a href="progress.html">📊<br>Progress</a>
    <a href="reminder.html">⏰<br>Reminder</a>
    <a href="settings.html">⚙️<br>Settings</a>
  </div>

</div>

<script src="home.js"></script>
</body>
</html>
