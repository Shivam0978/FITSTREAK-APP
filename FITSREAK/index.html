<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitStreak Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="login.css">
<script type="module" src="firebase.js" defer> </script>
</head>

<body>

<div class="screen">
  <div class="card">

    <!-- LOGO -->
    <div class="logo">
      <i class="fa-solid fa-person-running"></i>
      <span>Fit<span class="dark">Streak</span></span>
    </div>

    <!-- TOP WAVE (MOVED DOWN) -->
    <div class="top-wave"><h2 id="newj">let's start a new journey!</h2></div>

    <!-- FORM -->
    <div class="form">

      <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Gmail">
      </div>

      <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
        <i class="fa-regular fa-eye eye" id="eye" onclick="togglePassword()"></i>
      </div>

      <div class="forgot">
        <a href="forget.html">Forgot Password?</a>
      </div>

      <button class="login-btn" onclick="login()">Login</button>

      <div class="signup">
        <p>Don't have an account?</p>
        <a href="create.html">Create account</a>
      </div>

    </div>

    <!-- BOTTOM WAVE -->
    <div class="bottom-wave"></div>

  </div>
</div>

<script src="login.js"></script>
<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";

  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyAvVoXiM0uaSuFJNv9lsVgp1jS4rmfwqs0",
    authDomain: "fitstreak-cc222.firebaseapp.com",
    projectId: "fitstreak-cc222",
    storageBucket: "fitstreak-cc222.firebasestorage.app",
    messagingSenderId: "296596847733",
    appId: "1:296596847733:web:fcf9c740c50d7447f78c3c",
    measurementId: "G-Q3KBRXMD4S"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
</body>
</html>
