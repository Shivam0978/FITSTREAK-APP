<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password - FitStreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="new-password.css">
</head>

<body>

<div class="phone">

  <!-- Header -->
  <div class="top">
    <h3><a href="settings.html"><i class="fa-solid fa-arrow-left back"></i></a></h3>

    <div class="logo">
      <h3><i class="fa-solid fa-person-running"></i>
      <span>Fit<span class="dark">Streak</span></span></h3>
    </div>
  </div>

  <h2>Change Password</h2>

  <!-- Inputs -->

  <div class="field">
    <label>Current Password</label>
    <div class="input-box">
      <input type="password" id="curr">
      <i class="fa-regular fa-eye-slash" onclick="toggle('curr', this)"></i>
    </div>
  </div>

  <div class="field">
    <label>New Password</label>
    <div class="input-box">
      <input type="password" id="newp">
      <i class="fa-regular fa-eye-slash" onclick="toggle('newp', this)"></i>
    </div>
  </div>

  <div class="field">
    <label>Confirm New Password</label>
    <div class="input-box">
      <input type="password" id="conf">
      <i class="fa-regular fa-eye-slash" onclick="toggle('conf', this)"></i>
    </div>
  </div>

  <button onclick="savePass()" class="save">Save</button>

  

</div>

<script src="new-password.js"></script>
</body>
</htm
